name: validate

on:
  pull_request:
    paths:
      - "schemes/**"
      - "schema/**"
      - "scripts/validate-schemes.ts"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Validate every schemes/*.json against schema/scheme.schema.json (SPEC §5).
      - run: npm run validate
