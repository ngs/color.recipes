name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          # Required by .npmrc to fetch the @fortawesome Pro packages.
          FONT_AWESOME_PACKAGE_TOKEN: ${{ secrets.FONT_AWESOME_PACKAGE_TOKEN }}
      - run: npm run typecheck
      # Unit tests (Vitest): components + pure logic (happy-dom) and Worker
      # modules (workerd via @cloudflare/vitest-pool-workers).
      - run: npm test
      # Headless UI test (scripts/ui-check.ts via Playwright). The script prefers the
      # system Google Chrome and falls back to Playwright's Chromium, so install it
      # (plus OS deps) for the runner.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:ui
