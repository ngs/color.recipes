<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>color.recipes</title>
    <meta
      name="description"
      content="A searchable, curated color-scheme gallery with AI-assisted PR contributions."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Pliant:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#" aria-label="color.recipes home">
        <svg xmlns="http://www.w3.org/2000/svg"
          class="brand-mark"
          viewBox="0 0 512 512"
          aria-hidden="true"
          focusable="false"><!--!Font Awesome Pro v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2026 Fonticons, Inc.--><path fill="currentColor" d="M0 416c0 53 43 96 96 96l416 0 0-192-112.4 0-32 32 112.4 0 0 128-308.3 0 275.5-275.5 11.3-11.3-11.3-11.3-113.1-113.1-11.3-11.3-11.3 11.3-71.5 71.5 0 45.3 82.8-82.8 90.5 90.5-221.4 221.4 0-414.5-192 0 0 416zm96 64c-35.3 0-64-28.7-64-64l0-128 128 0 0 128c0 35.3-28.7 64-64 64zM32 256l0-96 128 0 0 96-128 0zm0-128l0-96 128 0 0 96-128 0zM96 440a24 24 0 1 0 0-48 24 24 0 1 0 0 48z"/></svg>
        <span class="brand-name">recipes</span>
      </a>
      <form id="search" class="search" autocomplete="off" role="search">
        <div id="tokens" class="tokens">
          <!-- selected-tag chips are injected here, before the input -->
          <input
            id="search-input"
            class="token-input"
            type="text"
            placeholder="Search by tag — type, pick a suggestion, or press Enter…"
            aria-label="Search by tag"
            role="combobox"
            aria-expanded="false"
            aria-autocomplete="list"
            aria-controls="suggest"
          />
        </div>
        <ul id="suggest" class="suggest hidden" role="listbox" aria-label="Tag suggestions"></ul>
      </form>
    </header>

    <main id="app" class="app"></main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
