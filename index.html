<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <!-- Tints the iOS status-bar / browser UI; updated per scheme to var(--bg). -->
    <meta name="theme-color" content="#0f1115" />

    <!-- Favicons: SVG (retinted per scheme at runtime, see applyTheme) with PNG
         fallbacks; apple-touch-icon + manifest for installable PWA. -->
    <link rel="icon" id="favicon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="color.recipes" />

    <title>color.recipes</title>
    <meta
      name="description"
      content="A searchable, curated color-scheme gallery with AI-assisted PR contributions."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/tss2gwh.css">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Safari 26 tints its UI (notch / status bar / bottom bar) by sampling
         <body>'s background-color, which we keep at the scheme bg (var(--bg)).
         Edge elements (e.g. the sticky top bar) must NOT use backdrop-filter:
         its mere presence disqualifies sampling and the notch falls back to
         black. (andesco/safari-color-tinting) -->

    <!-- The entire app (top bar + main content) is rendered here by Preact. -->
    <div id="app"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
